<!DOCTYPE html>
<html>
<head>
  <title>Important Question 😌</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      height: 100vh;
      overflow: hidden;
      margin: 0;
    }

    h1 {
      margin-top: 100px;
      font-size: 45px;
      color: white;
    }

    .buttons {
      margin-top: 50px;
      position: relative;
      height: 300px;
    }

    button {
      padding: 15px 35px;
      font-size: 20px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      position: absolute;
      transition: 0.2s;
    }

    #yes {
      background-color: white;
      color: #ff4d6d;
      left: 40%;
      transform: scale(1);
    }

    #no {
      background-color: #ff4d6d;
      color: white;
      left: 55%;
    }

    .heart {
      position: fixed;
      color: white;
      font-size: 20px;
      animation: floatUp 3s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body>

<h1>Are you Nakchadi? 🙂🤷‍♂️</h1>

<div class="buttons">
  <button id="yes" onclick="sayYes()">YES 😌</button>
  <button id="no" onmouseover="moveNo()">NO 😅</button>
</div>

<script>
  let yesSize = 1;

  function sayYes() {
    document.body.innerHTML = `
      <h1 style='margin-top:120px;color:white;font-size:60px;'>Nikitaaaaaaaaaaaaa FAAAHHHHHHHHH 😌</h1>
      <h2 style='color:white;font-size:40px;'>Yayyy, You finally accepted it!!😌</h2>
      <h2 style='color:white;'>Jalwa hai hamara!!😎</h2>
    `;
    startHearts();
  }

  function moveNo() {
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");

    // Move NO randomly
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    // Make YES grow bigger
    yesSize += 0.2;
    yesBtn.style.transform = "scale(" + yesSize + ")";
  }

  function startHearts() {
    setInterval(() => {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💕";
      heart.style.left = Math.random() * 100 + "vw";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 3000);
    }, 300);
  }
</script>

</body>

</html>
